# Notarizes and staples the outermost macOS artifact shipped to users.
name: "Notarize macOS DMG"
description: "Sign if needed, notarize, staple, and validate a macOS DMG"
inputs:
  dmg-path:
    description: "Path to the DMG file"
    required: true
  signing-identity:
    description: "Developer ID Application identity for signing the DMG if needed"
    required: false
  apple-id:
    description: "Apple ID used for notarization"
    required: true
  apple-password:
    description: "App-specific password for notarization"
    required: true
  apple-team-id:
    description: "Apple Developer Team ID"
    required: true
runs:
  using: "composite"
  steps:
    - name: Notarize DMG
      shell: bash
      run: |
        set -euo pipefail

        DMG_PATH="${{ inputs.dmg-path }}"
        if [[ ! -f "$DMG_PATH" ]]; then
          echo "::error::DMG not found at $DMG_PATH"
          exit 1
        fi

        if ! codesign --verify --verbose=4 "$DMG_PATH"; then
          if [[ -z "${{ inputs.signing-identity }}" ]]; then
            echo "::error::DMG is not signed and no signing identity was provided"
            exit 1
          fi
          codesign --force --sign "${{ inputs.signing-identity }}" --timestamp "$DMG_PATH"
          codesign --verify --verbose=4 "$DMG_PATH"
        fi

        xcrun notarytool submit "$DMG_PATH" \
          --apple-id "${{ inputs.apple-id }}" \
          --password "${{ inputs.apple-password }}" \
          --team-id "${{ inputs.apple-team-id }}" \
          --wait

        xcrun stapler staple "$DMG_PATH"
        xcrun stapler validate "$DMG_PATH"
        spctl -a -t open -vvv --context context:primary-signature "$DMG_PATH"
