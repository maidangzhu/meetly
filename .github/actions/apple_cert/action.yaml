# Imports a Developer ID Application certificate into a temporary keychain.
name: "Setup Apple Certificate"
description: "Import and verify Apple Developer ID certificate for macOS signing"
inputs:
  apple-certificate:
    description: "Base64 encoded .p12 certificate"
    required: true
  apple-certificate-password:
    description: "Password for the .p12 certificate"
    required: true
  keychain-password:
    description: "Password for the temporary keychain"
    required: true
outputs:
  cert-id:
    description: "Developer ID Application signing identity"
    value: ${{ steps.verify-cert.outputs.cert-id }}
runs:
  using: "composite"
  steps:
    - name: Import certificate
      shell: bash
      run: |
        set -euo pipefail
        echo "${{ inputs.apple-certificate }}" | base64 --decode > certificate.p12
        security create-keychain -p "${{ inputs.keychain-password }}" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "${{ inputs.keychain-password }}" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        security import certificate.p12 -k build.keychain -P "${{ inputs.apple-certificate-password }}" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ inputs.keychain-password }}" build.keychain
        security find-identity -v -p codesigning build.keychain
        rm -f certificate.p12

    - id: verify-cert
      name: Verify Developer ID identity
      shell: bash
      run: |
        set -euo pipefail
        CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1)
        if [[ -z "$CERT_INFO" ]]; then
          echo "::error::No Developer ID Application certificate found in keychain"
          exit 1
        fi
        CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
        echo "cert-id=$CERT_ID" >> "$GITHUB_OUTPUT"
        echo "Using signing identity: $CERT_ID"
